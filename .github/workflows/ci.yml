name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be installed before setup-node so the pnpm cache can resolve.
      # Version comes from the `packageManager` field in package.json (pnpm@10.17.0).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Unit + non-destructive integration tests with coverage thresholds.
      # RUN_E2E / RUN_NET are intentionally NOT set: those require Postgres,
      # a live Portal, and an RPC endpoint, and run destructive SQL.
      - name: Test with coverage
        run: pnpm test:cov
