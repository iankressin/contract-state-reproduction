version: 2
updates:
  # npm dependencies (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut review noise.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
